[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid

[program:xvfb]
command=Xvfb :0 -screen 0 1024x768x16
autorestart=true
priority=100

[program:fluxbox]
command=fluxbox
environment=DISPLAY=":0"
autorestart=true
priority=200

[program:x11vnc]
command=x11vnc -display :0 -forever -nopw -listen localhost -rfbport 5900
autorestart=true
priority=300

[program:novnc]
command=websockify --web /usr/share/novnc %(ENV_PORT)s localhost:5900
autorestart=true
priority=400

[program:chromium]
# --no-sandbox and --disable-dev-shm-usage are required for Heroku/Docker
command=chromium-browser --display=:0 --no-sandbox --disable-dev-shm-usage --disable-gpu --disable-software-rasterizer --start-maximized
environment=DISPLAY=":0",DBUS_SESSION_BUS_ADDRESS="/dev/null"
autorestart=true
priority=500
# These lines ensure Chromium's internal errors show up in 'heroku logs --tail'
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
